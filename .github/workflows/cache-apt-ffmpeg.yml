name: cache apt ffmpeg

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu/lapack:/usr/lib/x86_64-linux-gnu/blas
    steps:
      - uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: ffmpeg sox
          execute_install_scripts: true
      - run: find /usr/lib/x86_64-linux-gnu/blas -ls
      - run: find /lib /usr/lib -name 'libblas*' -ls
      - run: which ffmpeg
      - run: /lib64/ld-linux-x86-64.so.2 --help
      - run: ldd $(which ffmpeg)
      - name: Verify ffmpeg installation
        run: ffmpeg -version

  libblas3:
    runs-on: ubuntu-latest
    steps:
      - uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: libblas3
      - name: look for libblas.so.3
        run: find /usr/lib/x86_64-linux-gnu/blas -ls
